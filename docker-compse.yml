version: '3.9'

services:

  backend:
    build: ./backend
    container_name: vitallog-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
    environment:
      - FLASK_ENV=production

  frontend:
    build: ./frontend
    container_name: vitallog-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  data: